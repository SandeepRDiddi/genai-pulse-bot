<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GenAI Pulse Bot 🤖</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --surface2: #1a1a3a;
      --accent: #667eea;
      --accent2: #764ba2;
      --text: #e8e8f8;
      --muted: #888aa8;
      --arxiv: #667eea;
      --hf: #f6a623;
      --reddit: #ff4500;
      --news: #00b4d8;
      --border: #2a2a4a;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
    .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .last-update { font-size: 12px; color: var(--muted); }
    .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .refresh-btn:hover { background: var(--accent); border-color: var(--accent); }

    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
    .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat-arxiv .value { color: var(--arxiv); }
    .stat-hf .value { color: var(--hf); }
    .stat-reddit .value { color: var(--reddit); }
    .stat-news .value { color: var(--news); }

    .controls { padding: 0 32px 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { color: var(--text); }
    .filter-btn.active[data-source="all"] { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active[data-source="arxiv"] { border-color: var(--arxiv); color: var(--arxiv); }
    .filter-btn.active[data-source="huggingface"] { border-color: var(--hf); color: var(--hf); }
    .filter-btn.active[data-source="reddit"] { border-color: var(--reddit); color: var(--reddit); }
    .filter-btn.active[data-source="technews"] { border-color: var(--news); color: var(--news); }
    .search-box { margin-left: auto; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 13px; width: 240px; outline: none; }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .feed { padding: 0 32px 32px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column; gap: 10px; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(102, 126, 234, 0.15); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-source { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
    .source-arxiv { background: rgba(102,126,234,0.15); color: var(--arxiv); }
    .source-huggingface { background: rgba(246,166,35,0.15); color: var(--hf); }
    .source-reddit { background: rgba(255,69,0,0.15); color: var(--reddit); }
    .source-technews { background: rgba(0,180,216,0.15); color: var(--news); }
    .card-category { font-size: 11px; color: var(--muted); }
    .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: var(--text); }
    .card-summary { font-size: 13px; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .card-meta { font-size: 12px; color: var(--muted); }
    .card-score { font-size: 12px; color: var(--muted); }
    .read-link { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .read-link:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .subscribe-banner { margin: 0 32px 24px; background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); border: 1px solid rgba(102,126,234,0.3); border-radius: 12px; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .subscribe-banner p { font-size: 14px; color: var(--muted); }
    .subscribe-banner strong { color: var(--text); }
    .subscribe-form { display: flex; gap: 8px; }
    .subscribe-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 13px; outline: none; width: 220px; }
    .subscribe-input:focus { border-color: var(--accent); }
    .subscribe-input::placeholder { color: var(--muted); }
    .subscribe-submit { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.2s; }
    .subscribe-submit:hover { opacity: 0.9; }

    @media (max-width: 768px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); padding: 16px; }
      .feed { padding: 0 16px 24px; grid-template-columns: 1fr; }
      .controls { padding: 0 16px 16px; }
      header { padding: 16px; }
      .search-box { width: 100%; margin-left: 0; }
      .subscribe-banner { flex-direction: column; margin: 0 16px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖 GenAI Pulse</div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">Loading...</span>
    <button class="refresh-btn" onclick="fetchArticles()">↻ Refresh</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card stat-arxiv"><div class="label">📄 Arxiv Papers</div><div class="value" id="stat-arxiv">—</div></div>
  <div class="stat-card stat-hf"><div class="label">🤗 HuggingFace</div><div class="value" id="stat-hf">—</div></div>
  <div class="stat-card stat-reddit"><div class="label">💬 Reddit</div><div class="value" id="stat-reddit">—</div></div>
  <div class="stat-card stat-news"><div class="label">📰 Tech News</div><div class="value" id="stat-news">—</div></div>
</div>

<div class="subscribe-banner">
  <div>
    <strong>Stay updated daily</strong>
    <p>Subscribe to receive the GenAI digest in your inbox every morning.</p>
  </div>
  <div class="subscribe-form">
    <input class="subscribe-input" type="email" id="subEmail" placeholder="your@email.com" />
    <button class="subscribe-submit" onclick="subscribe()">Subscribe →</button>
  </div>
</div>

<div class="controls">
  <button class="filter-btn active" data-source="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-source="arxiv" onclick="setFilter('arxiv', this)">📄 Arxiv</button>
  <button class="filter-btn" data-source="huggingface" onclick="setFilter('huggingface', this)">🤗 HuggingFace</button>
  <button class="filter-btn" data-source="reddit" onclick="setFilter('reddit', this)">💬 Reddit</button>
  <button class="filter-btn" data-source="technews" onclick="setFilter('technews', this)">📰 Tech News</button>
  <input class="search-box" type="text" placeholder="Search articles..." oninput="searchArticles(this.value)" />
</div>

<div class="feed" id="feed">
  <div class="loading"><div class="spinner"></div><p>Loading latest GenAI updates...</p></div>
</div>

<script>
  let allArticles = [];
  let currentFilter = 'all';
  let currentSearch = '';

  async function fetchArticles() {
    try {
      const res = await fetch('/api/articles?hours=48&limit=100');
      allArticles = await res.json();
      renderArticles();
      updateLastFetch();
    } catch (e) {
      document.getElementById('feed').innerHTML = '<div class="loading"><p>Failed to load. Is the server running?</p></div>';
    }
  }

  async function fetchStats() {
    try {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      document.getElementById('stat-arxiv').textContent = stats.by_source.arxiv || 0;
      document.getElementById('stat-hf').textContent = stats.by_source.huggingface || 0;
      document.getElementById('stat-reddit').textContent = stats.by_source.reddit || 0;
      document.getElementById('stat-news').textContent = stats.by_source.technews || 0;
    } catch(e) {}
  }

  function renderArticles() {
    let filtered = allArticles;
    if (currentFilter !== 'all') filtered = filtered.filter(a => a.source === currentFilter);
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      filtered = filtered.filter(a => a.title.toLowerCase().includes(q) || (a.summary||'').toLowerCase().includes(q));
    }

    if (!filtered.length) {
      document.getElementById('feed').innerHTML = '<div class="loading"><p>No articles found.</p></div>';
      return;
    }

    document.getElementById('feed').innerHTML = filtered.map(a => `
      <div class="card" onclick="window.open('${a.url}','_blank')">
        <div class="card-header">
          <span class="card-source source-${a.source}">${sourceLabel(a.source)}</span>
          <span class="card-category">${a.category || ''}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-summary">${a.summary || ''}</div>
        <div class="card-footer">
          <span class="card-meta">${timeAgo(a.published_at)} · ${a.authors ? a.authors.slice(0,40) : ''}</span>
          ${a.score > 0 ? `<span class="card-score">▲ ${a.score.toLocaleString()}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function setFilter(source, btn) {
    currentFilter = source;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderArticles();
  }

  function searchArticles(q) {
    currentSearch = q;
    renderArticles();
  }

  function sourceLabel(source) {
    return {arxiv:'📄 Arxiv', huggingface:'🤗 HuggingFace', reddit:'💬 Reddit', technews:'📰 Tech News'}[source] || source;
  }

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  function updateLastFetch() {
    document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  }

  async function subscribe() {
    const email = document.getElementById('subEmail').value;
    if (!email) return;
    try {
      const res = await fetch('/api/subscribe', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, frequency: 'daily'}),
      });
      if (res.ok) alert('🎉 Subscribed! Check your inbox tomorrow morning.');
      else alert('Already subscribed or invalid email.');
    } catch(e) { alert('Failed to subscribe. Try again.'); }
  }

  // Auto-refresh every 10 minutes
  fetchArticles();
  fetchStats();
  setInterval(fetchArticles, 10 * 60 * 1000);
  setInterval(fetchStats, 10 * 60 * 1000);
</script>
</body>
</html>
